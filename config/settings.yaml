input_dir: "input/originals"
output_display_dir: "output/display"
output_thumb_dir: "output/thumbs"
output_metadata_dir: "output/metadata"
output_logs_dir: "output/logs"

thumb_max_size: 800
display_max_size: 2400

thumb_quality: 75
display_quality: 85

supported_extensions:
  - ".jpg"
  - ".jpeg"
  - ".png"

default_author: "Luke Chu"

overwrite: false

# ===== EXIF enum term mappings =====
exif_term_mappings:
  metering_mode:
    "0": "未知测光"
    "1": "平均测光"
    "2": "中央重点平均测光"
    "3": "点测光"
    "4": "多点测光"
    "5": "评价/矩阵测光"
    "6": "局部测光"
    "255": "其他测光模式"
    default: "未映射测光模式"

  exposure_program:
    "0": "未定义"
    "1": "手动曝光"
    "2": "程序自动曝光"
    "3": "光圈优先自动曝光"
    "4": "快门优先自动曝光"
    "5": "创意程序"
    "6": "运动程序"
    "7": "人像程序"
    "8": "风景程序"
    default: "未映射曝光程序"

  white_balance:
    "0": "自动白平衡"
    "1": "手动白平衡"
    default: "未映射白平衡"

  flash:
    "0": "闪光灯未触发"
    "1": "闪光灯触发"
    "5": "闪光灯触发，回光未检测"
    "7": "闪光灯触发，回光已检测"
    "9": "强制闪光，已触发"
    "13": "强制闪光，回光未检测"
    "15": "强制闪光，回光已检测"
    "16": "闪光灯关闭"
    "24": "自动闪光，未触发"
    "25": "自动闪光，已触发"
    "29": "自动闪光，已触发，回光未检测"
    "31": "自动闪光，已触发，回光已检测"
    "32": "无闪光功能"
    "65": "防红眼，闪光灯触发"
    "69": "防红眼，回光未检测"
    "71": "防红眼，回光已检测"
    "73": "自动闪光+防红眼，未触发"
    "77": "自动闪光+防红眼，已触发"
    "79": "自动闪光+防红眼，回光已检测"
    "89": "强制闪光+防红眼，已触发"
    "93": "强制闪光+防红眼，回光未检测"
    "95": "强制闪光+防红眼，回光已检测"
    default: "未映射闪光状态"

# ===== AI metadata generation =====
qwen_model_path: "C:/Users/Luke/.cache/modelscope/hub/models/Qwen/Qwen3-VL-4B-Instruct"
qwen_processor_path: "C:/Users/Luke/.cache/modelscope/hub/models/Qwen/Qwen3-VL-4B-Instruct"

ai_prompt_file: "prompts/photo_metadata_prompt.txt"

ai_input_jsonl: "output/metadata/photos.jsonl"
ai_output_jsonl: "output/metadata/photos_ai.jsonl"
ai_failed_jsonl: "output/metadata/photos_ai_failed.jsonl"

# 使用 thumb 图做识别，更快、更省显存
ai_image_source: "thumb"

# 是否跳过已经有 title_cn 的记录
ai_skip_completed: true

# 推理参数
ai_max_new_tokens: 256
ai_temperature: 0.6
ai_top_p: 0.9
ai_do_sample: true
ai_repetition_penalty: 1.06

# 断点续跑
ai_resume: true

# prompt 版本号，便于后面区分
ai_prompt_version: "v1"

# ===== PostgreSQL import =====
pg_host: "127.0.0.1"
pg_port: 5432
pg_database: "luke-chu-site"
pg_user: "admin"
pg_password: "1234"
pg_timezone: "Asia/Shanghai"
