input_dir: "input/originals"
output_display_dir: "output/display"
output_thumb_dir: "output/thumbs"
output_metadata_dir: "output/metadata"
output_logs_dir: "output/logs"

thumb_max_size: 800
display_max_size: 2400

thumb_quality: 75
display_quality: 85

supported_extensions:
  - ".jpg"
  - ".jpeg"
  - ".png"

default_author: "Luke Chu"

overwrite: false

# ===== EXIF enum term mappings =====
exif_term_mappings:
  metering_mode:
    "0": "Unknown"
    "1": "Average Metering"
    "2": "Center-Weighted Average Metering"
    "3": "Spot Metering"
    "4": "Multi-Spot Metering"
    "5": "Pattern/Matrix Metering"
    "6": "Partial Metering"
    "255": "Other Metering Mode"
    default: "Unmapped Metering Mode"

  exposure_program:
    "0": "Not Defined"
    "1": "Manual"
    "2": "Program AE"
    "3": "Aperture Priority AE"
    "4": "Shutter Priority AE"
    "5": "Creative Program"
    "6": "Action Program"
    "7": "Portrait Program"
    "8": "Landscape Program"
    default: "Unmapped Exposure Program"

  white_balance:
    "0": "Auto White Balance"
    "1": "Manual White Balance"
    default: "Unmapped White Balance"

  flash:
    "0": "Flash Did Not Fire"
    "1": "Flash Fired"
    "5": "Flash Fired, Return Not Detected"
    "7": "Flash Fired, Return Detected"
    "9": "Flash Fired (Compulsory)"
    "13": "Flash Fired (Compulsory), Return Not Detected"
    "15": "Flash Fired (Compulsory), Return Detected"
    "16": "Flash Off"
    "24": "Auto Flash, Did Not Fire"
    "25": "Auto Flash, Fired"
    "29": "Auto Flash, Fired, Return Not Detected"
    "31": "Auto Flash, Fired, Return Detected"
    "32": "No Flash Function"
    "65": "Red-Eye Reduction, Flash Fired"
    "69": "Red-Eye Reduction, Return Not Detected"
    "71": "Red-Eye Reduction, Return Detected"
    "73": "Auto Flash, Red-Eye Reduction, Did Not Fire"
    "77": "Auto Flash, Red-Eye Reduction, Fired"
    "79": "Auto Flash, Red-Eye Reduction, Return Detected"
    "89": "Compulsory Flash, Red-Eye Reduction, Fired"
    "93": "Compulsory Flash, Red-Eye Reduction, Return Not Detected"
    "95": "Compulsory Flash, Red-Eye Reduction, Return Detected"
    default: "Unmapped Flash Status"

# ===== AI metadata generation =====
qwen_model_path: "C:/Users/Luke/.cache/modelscope/hub/models/Qwen/Qwen3-VL-2B-Instruct"
qwen_processor_path: "C:/Users/Luke/.cache/modelscope/hub/models/Qwen/Qwen3-VL-2B-Instruct"

ai_prompt_file: "prompts/photo_metadata_prompt.txt"

ai_input_jsonl: "output/metadata/photos.jsonl"
ai_output_jsonl: "output/metadata/photos_ai.jsonl"
ai_failed_jsonl: "output/metadata/photos_ai_failed.jsonl"

# 使用 thumb 图做识别，更快、更省显存
ai_image_source: "thumb"

# 是否跳过已经有 title_cn 的记录
ai_skip_completed: true

# 推理参数
ai_max_new_tokens: 320
ai_temperature: 0.8
ai_top_p: 0.95
ai_do_sample: true
ai_repetition_penalty: 1.08

# 断点续跑
ai_resume: true

# prompt 版本号，便于后面区分
ai_prompt_version: "v1"
